<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGO — Sightings</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 80px 32px 64px;
    }

    a { color: inherit; text-decoration: none; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(0,0,0,0.4);
      border-bottom: 0.5px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
    }

    nav .logo {
      color: #111;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.12em;
    }

    nav a {
      color: rgba(0,0,0,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: #111; }

    header {
      display: flex;
      align-items: baseline;
      gap: 24px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    header h1 {
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #000;
    }

    .header-title-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    #status {
      font-size: 16px;
      color: rgba(0,0,0,0.35);
      letter-spacing: 0.05em;
    }

    footer {
      position: relative;
      z-index: 10;
      padding: 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.08em;
      border-top: 0.5px solid rgba(0,0,0,0.06);
    }

    footer a {
      color: rgba(0,0,0,0.4);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    .section {
      margin-bottom: 64px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      column-gap: 12px;
      row-gap: 32px;
    }

    .grid-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .grid-item .thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      border-radius: 4px;
      cursor: pointer;
    }

    .grid-item .thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.15s;
    }

    .grid-item .thumb:hover img {
      opacity: 0.88;
    }

    .grid-caption {
      font-size: 14px;
      font-weight: 500;
      color: rgba(0,0,0,0.4);
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 3px;
    }

  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">UGO</a>
    <a href="/about">about</a>
    <a href="/gallery">gallery</a>
    <a href="/sightings" style="color: #111;">sightings</a>
  </nav>

  <header>
    <div class="header-title">
      <h1>Sightings</h1>
      <div style="font-size: 12px; color: rgba(0,0,0,0.45); letter-spacing: 0.04em; margin-top: 6px;">Want to share a sighting? → <a href="mailto:alex@usergeneratedorbit.com">alex@usergeneratedorbit.com</a></div>
    </div>
  </header>

  <div class="section">
    <div class="section-label">Search based UGO</div>
    <div class="grid" id="grid-search"></div>
  </div>
  <div class="section">
    <div class="section-label">Wandering freeform</div>
    <div class="grid" id="grid-freeform"></div>
  </div>

  <div id="lightbox">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // Search-generated UGOs — clean city-to-city flight paths
    const searchImages = [
      'sighting-search-2026-03-08-11-44-54.png',
      'sighting-search-2026-03-08-11-18-55.png',
      'sighting-search-2026-03-08-11-18-39.png',
      'sighting-search-2026-03-08-10-55-28.png',
      'sighting-search-2026-03-08-00-12-04.png',
      'sighting-search-2026-03-07-22-30-03.png',
      'sighting-search-2026-03-03-21-30-03.png',
      'sighting-search-2026-03-03-20-30-03.png',
    ];

    // Freeform UGOs — human wandering
    const freeformImages = [
      'sighting-freeform-2026-03-15-21-20-25.png',
      'sighting-freeform-2026-03-08-11-11-47.png',
      'sighting-freeform-2026-03-08-23-24-18.png',
      'sighting-freeform-2026-03-08-23-24-59.png',
    ];

    const allImages = [...searchImages, ...freeformImages];

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    let current = 0;

    function open(index) {
      current = (index + allImages.length) % allImages.length;
      lightboxImg.src = allImages[current];
      lightbox.classList.add('open');
    }

    function close() {
      lightbox.classList.remove('open');
    }

    function renderGrid(images, gridId, offset) {
      const grid = document.getElementById(gridId);
      images.forEach((filename, i) => {
        const item = document.createElement('div');
        item.className = 'grid-item';

        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.addEventListener('click', () => open(offset + i));

        const img = document.createElement('img');
        img.src = filename;
        img.alt = '';
        thumb.appendChild(img);

        item.appendChild(thumb);
        grid.appendChild(item);
      });
    }

    renderGrid(searchImages, 'grid-search', 0);
    renderGrid(freeformImages, 'grid-freeform', searchImages.length);

    lightbox.addEventListener('click', close);

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowRight' && current < allImages.length - 1) open(current + 1);
      else if (e.key === 'ArrowLeft' && current > 0) open(current - 1);
      else if (e.key === 'Escape') close();
    });
  </script>

<footer>
  <span>Contact<br><a href="mailto:alex@usergeneratedorbit.com">alex@usergeneratedorbit.com</a></span>
  <span>UGO - User Generated Orbit .:. 2026</span>
</footer>

</body>
</html>

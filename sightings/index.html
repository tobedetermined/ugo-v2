<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGO — Sightings</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 80px 32px 64px;
    }

    a { color: inherit; text-decoration: none; }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 18px;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 20px 28px;
      background: #fff;
      z-index: 100;
    }

    .nav a {
      color: rgba(0,0,0,0.3);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav a:hover { color: #ff2020; }
    .nav a.current { color: #000; font-weight: 500; pointer-events: none; }

    header {
      display: flex;
      align-items: baseline;
      gap: 24px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    header h1 {
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #000;
    }

    .header-title-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    #status {
      font-size: 16px;
      color: rgba(0,0,0,0.35);
      letter-spacing: 0.05em;
    }

    footer {
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(0, 0, 0, 0.45);
    }

    footer a {
      color: #ff2020;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      column-gap: 12px;
      row-gap: 32px;
    }

    .grid-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .grid-item .thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      border-radius: 4px;
      cursor: pointer;
    }

    .grid-item .thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.15s;
    }

    .grid-item .thumb:hover img {
      opacity: 0.88;
    }

    .grid-caption {
      font-size: 14px;
      font-weight: 500;
      color: rgba(0,0,0,0.4);
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 3px;
    }

  </style>
</head>
<body>

  <nav class="nav">
    <a href="/">UGO</a>
    <a href="/about">about</a>
    <a href="/gallery">gallery</a>
    <a href="/sightings" class="current">sightings</a>
  </nav>

  <header>
    <div class="header-title">
      <h1>Sightings</h1>
      <footer>Want to share a sighting? → <a href="mailto:alex@usergeneratedorbit.com">alex@usergeneratedorbit.com</a></footer>
    </div>
  </header>

  <div class="grid" id="grid"></div>

  <div id="lightbox">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // Add image filenames here as you drop them into /sightings/
    const images = [
      'sighting-2026-03-08-11-44-54.png',
      'sighting-2026-03-08-11-18-55.png',
      'sighting-2026-03-08-11-18-39.png',
      'sighting-2026-03-08-11-11-47.png',
      'sighting-2026-03-08-10-55-28.png',
      'sighting-2026-03-08-00-12-04.png',
      'sighting-2026-03-07-22-30-03.png',
      'sighting-2026-03-03-21-30-03.png',
      'sighting-2026-03-03-20-30-03.png',
    ];

    const grid = document.getElementById('grid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');


    let current = 0;

    function open(index) {
      current = (index + images.length) % images.length;
      lightboxImg.src = images[current];
      lightbox.classList.add('open');
    }

    function close() {
      lightbox.classList.remove('open');
    }

    function parseDate(filename) {
      const m = filename.match(/sighting-(\d{4})-(\d{2})-(\d{2})-(\d{2})-(\d{2})-(\d{2})/);
      if (!m) return filename;
      const [, y, mo, d, h, min] = m;
      const date = new Date(y, mo - 1, d, h, min);
      return date.toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    images.forEach((filename, i) => {
      const item = document.createElement('div');
      item.className = 'grid-item';

      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      thumb.addEventListener('click', () => open(i));

      const img = document.createElement('img');
      img.src = filename;
      img.alt = '';
      thumb.appendChild(img);

      item.appendChild(thumb);
      grid.appendChild(item);
    });

    lightbox.addEventListener('click', close);

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowRight' && current < images.length - 1) open(current + 1);
      else if (e.key === 'ArrowLeft' && current > 0) open(current - 1);
      else if (e.key === 'Escape') close();
    });
  </script>

</body>
</html>

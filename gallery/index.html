<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGO — Gallery</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    a { color: inherit; text-decoration: none; }

    body {
      background: #fff;
      color: #333;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 80px 32px 48px;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 24px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header-title-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    header h1 {
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #000;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(0,0,0,0.4);
      border-bottom: 0.5px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
    }

    nav .logo {
      color: #111;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.12em;
    }

    nav a {
      color: rgba(0,0,0,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: #111; }

    #status {
      font-size: 16px;
      color: rgba(0,0,0,0.35);
      letter-spacing: 0.05em;
    }

    #filters {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      background: none;
      border: 1px solid rgba(0,0,0,0.12);
      color: rgba(0,0,0,0.35);
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .filter-btn:hover { color: rgba(0,0,0,0.7); border-color: rgba(0,0,0,0.4); }
    .filter-btn.active { color: #000; border-color: rgba(0,0,0,0.5); }

    #btn-edit {
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.05em;
      background: none;
      border: 1px solid rgba(0,0,0,0.15);
      color: rgba(0,0,0,0.35);
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
      margin-left: auto;
      transition: color 0.15s, border-color 0.15s;
    }

    #btn-edit:hover { color: rgba(0,0,0,0.7); border-color: rgba(0,0,0,0.4); }
    #btn-edit.active { color: rgba(255,180,50,0.9); border-color: rgba(255,180,50,0.4); }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: #f7f7f7;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: border-color 0.15s, transform 0.15s, opacity 0.15s;
      position: relative;
    }

    .card:hover {
      border-color: rgba(0,0,0,0.2);
      transform: translateY(-2px);
    }

    /* In edit mode, cards are not links */
    body.edit-mode .card { pointer-events: none; transform: none; }
    body.edit-mode .card:hover { border-color: rgba(0,0,0,0.08); }

    .card.hidden-card {
      opacity: 0.3;
    }

    /* Hide hidden cards in normal mode */
    body:not(.edit-mode) .card.hidden-card { display: none; }

    .card-sketch {
      display: block;
      width: 100%;
      height: 160px;
      background: #0d0d0d;
    }

    .card-meta {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-location {
      font-size: 14px;
      color: #000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-location.loading { color: rgba(0,0,0,0.2); }

    .card-details {
      font-size: 12px;
      color: rgba(0,0,0,0.6);
      letter-spacing: 0.05em;
      display: flex;
      gap: 12px;
    }

    .card-tag {
      font-size: 11px;
      color: rgba(255,100,50,0.6);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Hide button — only visible in edit mode */
    .card-hide-btn {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 9px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
      padding: 3px 8px;
      border-radius: 2px;
      cursor: pointer;
      pointer-events: all;
      transition: color 0.15s, border-color 0.15s;
    }

    body.edit-mode .card-hide-btn { display: block; }

    .card-hide-btn:hover { color: #fff; border-color: rgba(255,255,255,0.6); }

    .card.hidden-card .card-hide-btn {
      color: rgba(255,180,50,0.7);
      border-color: rgba(255,180,50,0.3);
    }

    .card.hidden-card .card-hide-btn:hover {
      color: rgba(255,180,50,1);
      border-color: rgba(255,180,50,0.7);
    }
    footer {
      position: relative;
      z-index: 10;
      padding: 2rem;
      margin-top: 4rem;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.08em;
      border-top: 0.5px solid rgba(0,0,0,0.06);
    }

    footer a {
      color: rgba(0,0,0,0.4);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">UGO</a>
    <a href="/about">about</a>
    <a href="/gallery" style="color: #111;">gallery</a>
    <a href="/sightings">sightings</a>
  </nav>

  <header>
    <div class="header-title">
      <div class="header-title-row">
        <h1>Gallery</h1>
        <span id="status">loading…</span>
      </div>
      <div style="font-size: 12px; color: rgba(0,0,0,0.45); letter-spacing: 0.04em; margin-top: 6px;">Want to share your UGO? → <a href="mailto:alex@usergeneratedorbit.com">alex@usergeneratedorbit.com</a></div>
    </div>
    <!-- motion type filter — re-enable once tagging is verified
    <div id="filters">
      <button class="filter-btn active" data-filter="all">all</button>
      <button class="filter-btn" data-filter="search">search</button>
      <button class="filter-btn" data-filter="manual">manual</button>
      <button class="filter-btn" data-filter="mixed">mixed</button>
    </div>
    -->
    <button id="btn-edit">edit</button>
  </header>

  <div id="grid"></div>

  <script src="edit-config.js" onerror="void 0"></script>
  <script>
    const WORKER = 'https://usergeneratedorbitbot.navarenko.workers.dev';

    let editMode = false;
    let editKey  = window.UGO_EDIT_KEY || sessionStorage.getItem('ugo-edit-key') || '';

    document.getElementById('btn-edit').addEventListener('click', () => {
      if (!editMode) {
        const key = editKey || prompt('Edit key:');
        if (!key) return;
        editKey = key;
        sessionStorage.setItem('ugo-edit-key', key);
      }
      editMode = !editMode;
      document.body.classList.toggle('edit-mode', editMode);
      document.getElementById('btn-edit').classList.toggle('active', editMode);
      load(editMode ? editKey : null);
    });

    const GEO_CACHE_VERSION = '4';
    if (localStorage.getItem('ugo-geo-cache-version') !== GEO_CACHE_VERSION) {
      Object.keys(localStorage).filter(k => k.startsWith('ugo-geo-')).forEach(k => localStorage.removeItem(k));
      localStorage.setItem('ugo-geo-cache-version', GEO_CACHE_VERSION);
    }

    async function load(key = null) {
      const status = document.getElementById('status');
      const grid   = document.getElementById('grid');

      status.textContent = 'loading…';
      grid.innerHTML = '';

      let cards;
      try {
        const headers = key ? { 'X-Edit-Key': key } : {};
        const res = await fetch(`${WORKER}/gists/cards`, { headers });
        cards     = await res.json();
      } catch (e) {
        status.textContent = 'could not load';
        return;
      }

      if (!cards.length) {
        status.textContent = 'no recordings yet';
        return;
      }

      status.textContent = `${cards.length} UGO${cards.length !== 1 ? 's' : ''}`;

      for (const card of cards) {
        grid.appendChild(buildCard(card));
      }

      // Reverse-geocode — use localStorage cache, only call Nominatim for misses
      const toFetch = [];
      for (const el of grid.querySelectorAll('.card-location[data-start-lat]')) {
        const cacheKey = `ugo-geo-${el.dataset.gistId}`;
        const cached   = localStorage.getItem(cacheKey);
        if (cached) {
          el.textContent = cached;
          el.classList.remove('loading');
        } else {
          toFetch.push(el);
        }
      }
      for (const el of toFetch) {
        await reverseGeocode(el);
        await sleep(1100); // Nominatim rate limit — Worker enforces 1 req/sec on misses
      }
    }

    async function toggleHidden(gist, card) {
      const desc    = gist.description || '';
      const isHidden = desc.includes('[hidden]');
      const newDesc  = isHidden
        ? desc.replace(/\s*\[hidden\]/, '').trim()
        : (desc + ' [hidden]').trim();

      const btn = card.querySelector('.card-hide-btn');
      btn.textContent = '···';
      btn.disabled = true;

      try {
        const resp = await fetch(`${WORKER}/gist`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'X-Edit-Key': editKey },
          body: JSON.stringify({ id: gist.id, description: newDesc }),
        });
        if (resp.status === 401) {
          sessionStorage.removeItem('ugo-edit-key');
          editKey = '';
          throw new Error('Unauthorized');
        }
        gist.description = newDesc;
        card.classList.toggle('hidden-card', !isHidden);
        btn.textContent = !isHidden ? 'show' : 'hide';
      } catch (e) {
        btn.textContent = 'error';
      }

      btn.disabled = false;
    }

    function buildCard(card) {
      const dur       = formatDuration(card.metadata.totalDurationMs);
      const dist      = card.metadata.distance ? card.metadata.distance.toFixed(1) + ' km' : null;
      const date      = new Date(card.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      const tag       = isLocalhost ? ((card.description || '').match(/\[(dev|local)\]/)?.[1]?.toUpperCase() || null) : null;
      const isHidden  = (card.description || '').includes('[hidden]');

      const a = document.createElement('a');
      a.className          = 'card' + (isHidden ? ' hidden-card' : '');
      a.href               = `/?ugo=${card.id}`;
      a.target             = '_blank';
      a.dataset.motionType = card.metadata.motionType || 'manual';

      // Globe SVG thumbnail
      const globeCacheKey = `ugo-globe-v1-${card.id}`;
      const cachedGlobe   = localStorage.getItem(globeCacheKey);
      let globeSvg;
      if (cachedGlobe) {
        const tmp = document.createElement('div');
        tmp.innerHTML = cachedGlobe;
        globeSvg = tmp.firstChild;
      } else {
        globeSvg = buildGlobeSVG(card);
        try { localStorage.setItem(globeCacheKey, globeSvg.outerHTML); } catch (e) { /* storage full */ }
      }
      a.appendChild(globeSvg);

      // /* OLD SVG sketch — use localStorage cache to skip recomputation on repeat visits
      // const svgCacheKey = `ugo-svg-v4-${card.id}`;
      // const cachedSvg   = localStorage.getItem(svgCacheKey);
      // let svg;
      // if (cachedSvg) {
      //   const tmp = document.createElement('div');
      //   tmp.innerHTML = cachedSvg;
      //   svg = tmp.firstChild;
      //   svg._pulseAnim = svg.querySelector('animate');
      // } else {
      //   svg = buildSVG(card);
      //   try { localStorage.setItem(svgCacheKey, svg.outerHTML); } catch (e) { /* storage full */ }
      // }
      // a.appendChild(svg);
      // a.addEventListener('mouseenter', () => svg._pulseAnim?.beginElement());
      // */

      // Hide/show button
      const hideBtn = document.createElement('button');
      hideBtn.className   = 'card-hide-btn';
      hideBtn.textContent = isHidden ? 'show' : 'hide';
      hideBtn.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        toggleHidden(card, a);
      });
      a.appendChild(hideBtn);

      // Metadata
      const meta = document.createElement('div');
      meta.className = 'card-meta';

      const loc = document.createElement('div');
      loc.className        = 'card-location loading';
      loc.textContent      = '···';
      loc.dataset.startLat = card.firstFrame.lat;
      loc.dataset.startLng = card.firstFrame.lng;
      loc.dataset.endLat   = card.lastFrame.lat;
      loc.dataset.endLng   = card.lastFrame.lng;
      loc.dataset.gistId   = card.id;
      meta.appendChild(loc);

      const details = document.createElement('div');
      details.className = 'card-details';
      details.innerHTML = `<span>${date}</span>${dur ? `<span>${dur}</span>` : ''}${dist ? `<span>${dist}</span>` : ''}`;
      meta.appendChild(details);

      if (tag) {
        const tagEl = document.createElement('div');
        tagEl.className   = 'card-tag';
        tagEl.textContent = tag;
        meta.appendChild(tagEl);
      }

      a.appendChild(meta);
      return a;
    }

    function buildGlobeSVG(card) {
      const W = 260, H = 160;
      const R = 72;
      const cx = W / 2, cy = H / 2;
      const ns = 'http://www.w3.org/2000/svg';

      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('class', 'card-sketch');
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

      const defs = document.createElementNS(ns, 'defs');

      const clipId = `ec-${Math.random().toString(36).slice(2)}`;
      const clipPath = document.createElementNS(ns, 'clipPath');
      clipPath.setAttribute('id', clipId);
      const clipCircle = document.createElementNS(ns, 'circle');
      clipCircle.setAttribute('cx', cx); clipCircle.setAttribute('cy', cy); clipCircle.setAttribute('r', R);
      clipPath.appendChild(clipCircle);
      defs.appendChild(clipPath);

      const gradId = `eg-${Math.random().toString(36).slice(2)}`;
      const grad = document.createElementNS(ns, 'radialGradient');
      grad.setAttribute('id', gradId);
      grad.setAttribute('cx', '38%'); grad.setAttribute('cy', '32%'); grad.setAttribute('r', '65%');
      [['0%', '#1a4a6e'], ['100%', '#060f1a']].forEach(([off, col]) => {
        const s = document.createElementNS(ns, 'stop');
        s.setAttribute('offset', off); s.setAttribute('stop-color', col);
        grad.appendChild(s);
      });
      defs.appendChild(grad);
      svg.appendChild(defs);

      // Space background
      const bg = document.createElementNS(ns, 'rect');
      bg.setAttribute('width', W); bg.setAttribute('height', H); bg.setAttribute('fill', '#050a10');
      svg.appendChild(bg);

      // Earth
      const earth = document.createElementNS(ns, 'circle');
      earth.setAttribute('cx', cx); earth.setAttribute('cy', cy); earth.setAttribute('r', R);
      earth.setAttribute('fill', `url(#${gradId})`);
      svg.appendChild(earth);

      // Orthographic projection centred on UGO bounding box
      const allPts  = card.path.flat();
      const lats    = allPts.map(p => p.lat);
      const lngs    = allPts.map(p => p.lng);
      const lat0    = ((Math.min(...lats) + Math.max(...lats)) / 2) * Math.PI / 180;
      const lng0    = ((Math.min(...lngs) + Math.max(...lngs)) / 2) * Math.PI / 180;

      function project(lat, lng) {
        const φ = lat * Math.PI / 180, λ = lng * Math.PI / 180;
        const x = Math.cos(φ) * Math.sin(λ - lng0);
        const y = Math.cos(lat0) * Math.sin(φ) - Math.sin(lat0) * Math.cos(φ) * Math.cos(λ - lng0);
        const z = Math.sin(lat0) * Math.sin(φ) + Math.cos(lat0) * Math.cos(φ) * Math.cos(λ - lng0);
        return { x: cx + x * R, y: cy - y * R, visible: z >= 0 };
      }

      // Graticule
      const grat = document.createElementNS(ns, 'g');
      grat.setAttribute('clip-path', `url(#${clipId})`);
      grat.setAttribute('stroke', 'rgba(100,160,210,0.13)');
      grat.setAttribute('stroke-width', '0.5');
      grat.setAttribute('fill', 'none');
      for (let lat = -60; lat <= 60; lat += 30) {
        const pts = [];
        for (let lng = -180; lng <= 180; lng += 3) {
          const p = project(lat, lng);
          if (p.visible) pts.push(`${p.x.toFixed(1)},${p.y.toFixed(1)}`);
        }
        if (pts.length > 1) { const pl = document.createElementNS(ns, 'polyline'); pl.setAttribute('points', pts.join(' ')); grat.appendChild(pl); }
      }
      for (let lng = -180; lng < 180; lng += 30) {
        const pts = [];
        for (let lat = -90; lat <= 90; lat += 3) {
          const p = project(lat, lng);
          if (p.visible) pts.push(`${p.x.toFixed(1)},${p.y.toFixed(1)}`);
        }
        if (pts.length > 1) { const pl = document.createElementNS(ns, 'polyline'); pl.setAttribute('points', pts.join(' ')); grat.appendChild(pl); }
      }
      svg.appendChild(grat);

      // UGO path
      const pathGroup = document.createElementNS(ns, 'g');
      pathGroup.setAttribute('clip-path', `url(#${clipId})`);
      for (const seg of card.path) {
        if (seg.length < 2) continue;
        let pts = [];
        for (const pt of seg) {
          const p = project(pt.lat, pt.lng);
          if (p.visible) {
            pts.push(`${p.x.toFixed(1)},${p.y.toFixed(1)}`);
          } else {
            if (pts.length > 1) { const pl = document.createElementNS(ns, 'polyline'); pl.setAttribute('points', pts.join(' ')); pl.setAttribute('fill', 'none'); pl.setAttribute('stroke', '#ff2020'); pl.setAttribute('stroke-width', '2'); pl.setAttribute('stroke-linecap', 'round'); pl.setAttribute('stroke-linejoin', 'round'); pathGroup.appendChild(pl); }
            pts = [];
          }
        }
        if (pts.length > 1) { const pl = document.createElementNS(ns, 'polyline'); pl.setAttribute('points', pts.join(' ')); pl.setAttribute('fill', 'none'); pl.setAttribute('stroke', '#ff2020'); pl.setAttribute('stroke-width', '2'); pl.setAttribute('stroke-linecap', 'round'); pl.setAttribute('stroke-linejoin', 'round'); pathGroup.appendChild(pl); }
      }
      svg.appendChild(pathGroup);

      // Atmosphere ring
      const atm = document.createElementNS(ns, 'circle');
      atm.setAttribute('cx', cx); atm.setAttribute('cy', cy); atm.setAttribute('r', R);
      atm.setAttribute('fill', 'none');
      atm.setAttribute('stroke', 'rgba(100,170,230,0.35)');
      atm.setAttribute('stroke-width', '2');
      svg.appendChild(atm);

      return svg;
    }

    /* OLD — heartbeat/EKG sketch thumbnails
    // card.path is an array of segments, each segment is [{lat, lng}, ...]
    function buildSVG(card) {
      const W = 260, H = 160;
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('class', 'card-sketch');
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      svg.setAttribute('shape-rendering', 'geometricPrecision');

      const ns  = 'http://www.w3.org/2000/svg';
      const pad = 0.15;

      const allPts = card.path.flat();
      const lats   = allPts.map(p => p.lat);
      const lngs   = allPts.map(p => p.lng);
      const minLat = Math.min(...lats), maxLat = Math.max(...lats);
      const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
      const latRange = (maxLat - minLat) || 0.001;
      const lngRange = (maxLng - minLng) || 0.001;

      const toX = lng => ((lng - minLng) / lngRange) * W * (1 - 2 * pad) + W * pad;
      const toY = lat => H - ((lat - minLat) / latRange) * H * (1 - 2 * pad) - H * pad;

      // Graticule
      const latStep   = niceStep(latRange);
      const lngStep   = niceStep(lngRange);
      const graticule = document.createElementNS(ns, 'g');
      graticule.setAttribute('stroke', 'rgba(255,255,255,0.06)');
      graticule.setAttribute('stroke-width', '0.5');
      for (let lat = Math.ceil(minLat / latStep) * latStep; lat <= maxLat; lat += latStep) {
        const line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', 0); line.setAttribute('x2', W);
        line.setAttribute('y1', toY(lat).toFixed(1)); line.setAttribute('y2', toY(lat).toFixed(1));
        graticule.appendChild(line);
      }
      for (let lng = Math.ceil(minLng / lngStep) * lngStep; lng <= maxLng; lng += lngStep) {
        const line = document.createElementNS(ns, 'line');
        line.setAttribute('y1', 0); line.setAttribute('y2', H);
        line.setAttribute('x1', toX(lng).toFixed(1)); line.setAttribute('x2', toX(lng).toFixed(1));
        graticule.appendChild(line);
      }
      svg.appendChild(graticule);

      // Build smooth bezier path string for a segment using midpoint quadratic method.
      // Each pair of consecutive sample points becomes a Q curve through their midpoint,
      // making curves fluid regardless of sample density.
      function smoothSeg(seg) {
        if (seg.length < 2) return '';
        const pts = seg.map(p => [toX(p.lng), toY(p.lat)]);
        let d = `M ${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const mx = ((pts[i][0] + pts[i+1][0]) / 2).toFixed(1);
          const my = ((pts[i][1] + pts[i+1][1]) / 2).toFixed(1);
          d += ` Q ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)} ${mx},${my}`;
        }
        d += ` L ${pts[pts.length-1][0].toFixed(1)},${pts[pts.length-1][1].toFixed(1)}`;
        return d;
      }

      // Gradient path — smooth bezier path elements fading from dim to bright

          const mx  = ((x1 + x2) / 2).toFixed(1);
          const my  = ((y1 + y2) / 2).toFixed(1);
          const opacity = 0.15 + 0.5 * (i / (n - 1));
          // Use the previous midpoint as start so segments join smoothly
          const prevX = i > 0 ? ((toX(segment[i-1].lng) + x1) / 2).toFixed(1) : x1.toFixed(1);
          const prevY = i > 0 ? ((toY(segment[i-1].lat) + y1) / 2).toFixed(1) : y1.toFixed(1);
          const seg_path = document.createElementNS(ns, 'path');
          seg_path.setAttribute('d', `M ${prevX},${prevY} Q ${x1.toFixed(1)},${y1.toFixed(1)} ${mx},${my}`);
          seg_path.setAttribute('fill', 'none');
          seg_path.setAttribute('stroke', '#ff2020');
          seg_path.setAttribute('stroke-width', '1.5');
          seg_path.setAttribute('stroke-linecap', 'round');
          seg_path.setAttribute('opacity', opacity.toFixed(2));
          svg.appendChild(seg_path);

      merge.appendChild(node1); merge.appendChild(node2);

      // Animated pulse
      const dashLen = Math.max(12, totalLen * 0.08);

      pulse.setAttribute('fill', 'none');

    function niceStep(range) {
      const target = 3; // aim for ~3 grid lines
      const raw    = range / target;
      const mag    = Math.pow(10, Math.floor(Math.log10(raw)));
      const norm   = raw / mag;
      return (norm < 2 ? 1 : norm < 5 ? 2 : 5) * mag;
    }

    async function reverseGeocode(el) {
      const { startLat, startLng, endLat, endLng, gistId } = el.dataset;
      try {
        const res   = await fetch(`${WORKER}/geocode?gistId=${gistId}&startLat=${startLat}&startLng=${startLng}&endLat=${endLat}&endLng=${endLng}`);
        const label = await res.text();
        el.textContent = label;
        el.classList.remove('loading');
        if (label !== '—') localStorage.setItem(`ugo-geo-${gistId}`, label);
      } catch (e) {
        el.textContent = '—';
        el.classList.remove('loading');
      }
    }

    function formatDuration(ms) {
      if (!ms) return null;
      const s = Math.round(ms / 1000);
      const m = Math.floor(s / 60);
      return m > 0 ? `${m}m ${s % 60}s` : `${s}s`;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    load();

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGO — User Generated Orbit</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="map-container"></div>

  <!-- Transport panel (draggable) -->
  <div id="transport">
    <div id="transport-handle"></div>
    <div id="hud-stats">
      <span id="stat-status">Ready to record</span>
    </div>
    <div id="hud-controls">
      <button id="btn-record">● REC</button>
      <button id="btn-stop" disabled>■ STOP</button>
      <button id="btn-fill" disabled>◧ FILL</button>
      <button id="btn-clear" disabled>↺ CLEAR</button>
      <div class="transport-sep"></div>
      <button id="btn-save" disabled>↓ SAVE</button>
      <button id="btn-load">↑ LOAD</button>
      <button id="btn-home">⌂ RESET</button>
      <div class="transport-sep"></div>
      <div class="split-btn">
        <button id="btn-iss-toggle" class="split-left">ISS</button>
        <button id="btn-iss" class="split-right">→</button>
      </div>
      <!-- CSS/Tiangong tracking disabled — N2YO update issue, revisit later
      <div class="split-btn">
        <button id="btn-tiangong-toggle" class="split-left">CSS</button>
        <button id="btn-css" class="split-right">→</button>
      </div>
      -->
      <input id="file-input" type="file" accept=".kml" style="display:none">
      <div class="transport-sep"></div>
      <a href="/about" class="transport-about">about</a>
    </div>
  </div>

  <!-- Search bar -->
  <form id="search-bar" autocomplete="off">
    <input id="search-input" type="text" placeholder="fly to..." spellcheck="false">
    <button type="submit">GO</button>
  </form>

  <!-- Camera state readout -->
  <div id="camera-hud">
    <div class="c-row"><span class="c-label">lat</span><span id="c-lat">—</span></div>
    <div class="c-row"><span class="c-label">Long</span><span id="c-lng">—</span></div>
    <div class="c-row"><span class="c-label">alt</span><span id="c-alt">—</span></div>
    <div class="c-row"><span class="c-label">range</span><span id="c-range">—</span></div>
    <div class="c-row"><span class="c-label">tilt</span><span id="c-tilt">—</span></div>
    <div class="c-row"><span class="c-label">Heading</span><span id="c-hdg">—</span></div>
  </div>

  <!-- UGO metrics panel — toggle with backtick -->
  <div id="dev-hud">
    <div id="dev-title">UGO METRICS</div>
    <div class="dev-row"><span class="dev-label">duration</span><span id="dev-duration">—</span></div>
    <div class="dev-row"><span class="dev-label">distance</span><span id="dev-distance">—</span></div>
    <div class="dev-row"><span class="dev-label">max altitude</span><span id="dev-max-altitude">—</span></div>
    <div class="dev-row"><span class="dev-label">frames</span><span id="dev-frames">0</span></div>
    <div class="dev-row"><span class="dev-label">elev locations</span><span id="dev-elev-locations">0</span></div>
    <div class="dev-row"><span class="dev-label">elev requests</span><span id="dev-elev-requests">0</span></div>
    <div id="dev-elev-error"></div>
  </div>

  <script src="js/recorder.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/kml.js"></script>
  <script src="js/iss.js"></script>
  <script src="js/app.js"></script>

  <!--
    Enable: Maps JavaScript API
    Restrict to: localhost, 127.0.0.1
  -->
  <script src="config.js" onerror="void(0)"></script>
  <script>
    (function() {
      var key = (window.GOOGLE_MAPS_DEV_KEY && window.GOOGLE_MAPS_DEV_KEY !== 'PASTE_YOUR_LOCALHOST_KEY_HERE')
        ? window.GOOGLE_MAPS_DEV_KEY
        : 'AIzaSyCGDYdH7gyeUccxbqW6KXA0VDJx69lPbBA';
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' + key + '&v=beta&callback=initMap';
      document.head.appendChild(s);
    })();
  </script>

</body>
</html>

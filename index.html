<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGO — User Generated Orbit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      color: #000;
      font-family: 'Space Grotesk', sans-serif;
    }

    a { color: inherit; text-decoration: none; }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 48px 40px;
      background: #fff;
    }

    /* ── Logo lockup ── */
    .brand {
      display: flex;
      align-items: center;
    }

.title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(70px, 12vw, 140px);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #ff2020;
      line-height: 1;
    }

    /* ── Tagline + description ── */
    .sub {
      text-align: center;
    }

    .tagline {
      font-size: clamp(15px, 1.6vw, 24px);
      letter-spacing: 0.28em;
      color: rgba(0, 0, 0, 0.45);
      text-transform: uppercase;
    }

    .description {
      font-size: 16px;
      color: rgba(0, 0, 0, 0.45);
      letter-spacing: 0.04em;
      margin-top: 10px;
    }

    /* ── Launch button ── */
    .launch-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 11px 36px;
      border: 1px solid rgba(255, 50, 50, 0.7);
      border-radius: 3px;
      color: #ff5555;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s;
    }

    .launch-btn:hover {
      background: rgba(255, 30, 30, 0.12);
      border-color: rgba(255, 50, 50, 1);
    }

    /* ── Controls ── */
    .controls {
      display: grid;
      grid-template-columns: auto auto auto;
      column-gap: 24px;
      row-gap: 10px;
      margin-top: 128px;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .control {
      display: contents;
    }

    .control-header {
      text-align: left;
      font-weight: 700;
      color: rgba(0, 0, 0, 0.55);
      letter-spacing: 0.04em;
      padding-bottom: 4px;
    }

    .control-key {
      text-align: left;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.55);
      letter-spacing: 0.02em;
    }

.control-action {
      text-align: right;
      color: rgba(0, 0, 0, 1);
      letter-spacing: 0.04em;
    }

    .control-kb {
      text-align: left;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.55);
      letter-spacing: 0.02em;
      justify-self: start;
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="brand">
      <div class="title">U'GO</div>
    </div>

    <div class="sub">
      <div class="tagline">User Generated Orbit</div>
      <div class="description">Navigate Google Maps and visualize your User Generated Orbit.</div>
    </div>

    <a class="launch-btn" href="orbit/" target="_blank">Hello San Francisco Bay Area →</a>

    <div class="controls">
      <div class="control">
        <span class="control-action">move:</span>
        <span class="control-kb">← ↑ → ↓</span>
        <span class="control-key">click + drag</span>
      </div>
      <div class="control">
        <span class="control-action">tilt:</span>
        <span class="control-kb">Shift ↑ ↓</span>
        <span class="control-key">click + drag + <em>shift</em></span>
      </div>
      <div class="control">
        <span class="control-action" style="margin-top:10px">zoom:</span>
        <span class="control-kb" style="margin-top:10px">+ / −</span>
        <span class="control-key" style="margin-top:10px">2-finger drag</span>
      </div>
      <div class="control">
        <span class="control-action">up / down:</span>
        <span class="control-kb">Shift ← →</span>
        <span class="control-key">2-finger drag + <em>shift</em></span>
      </div>
      <div class="control">
        <span class="control-action"></span>
        <span class="control-kb"></span>
        <span class="control-key"></span>
      </div>
      <div class="control">
        <span class="control-action">full screen on / off:</span>
        <span class="control-kb">f</span>
        <span class="control-key"></span>
      </div>
    </div>

  </div>

</body>
</html>
